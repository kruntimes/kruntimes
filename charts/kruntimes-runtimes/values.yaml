# Built-in runtimes installed by this chart.
# Each creates a Runtime CR that the controller turns into a Deployment.

bash:
  image: kruntimes-bash-runtime:latest
  port: 9091
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 2Gi

python:
  image: kruntimes-python-runtime:latest
  port: 9092
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 4Gi
