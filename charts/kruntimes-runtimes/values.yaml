# Built-in runtimes installed by this chart.
# Each creates a Runtime CR that the controller turns into a Deployment.

workspace:
  sizeLimit: 10Gi

bash:
  image: ghcr.io/kruntimes/bash-runtime
  port: 9091
  replicas: 2
  capacity:
    resources:
      runs: "2"
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 2Gi

python:
  image: ghcr.io/kruntimes/python-runtime
  port: 9092
  replicas: 2
  capacity:
    resources:
      runs: "2"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 4Gi
