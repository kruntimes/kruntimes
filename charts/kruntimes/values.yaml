imagePullSecrets: []

scheduler:
  image: ghcr.io/kruntimes/scheduler
  imagePullPolicy: IfNotPresent
  replicas: 2
  leaderElect: true
  metricsBindAddress: ":8080"
  probeBindAddress: ":8081"
  metricsPort: 8080
  probePort: 8081
  podAnnotations: {}
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  priorityClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

controller:
  image: ghcr.io/kruntimes/controller
  imagePullPolicy: IfNotPresent
  replicas: 1
  leaderElect: true
  metricsBindAddress: ":8082"
  probeBindAddress: ":8083"
  metricsPort: 8082
  probePort: 8083
  podAnnotations: {}
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  priorityClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

runtimed:
  image: ghcr.io/kruntimes/runtimed

workspace:
  sizeLimit: 10Gi

metrics:
  service:
    type: ClusterIP
    port: 8080
    annotations: {}
  # Disabled by default because ServiceMonitor is provided by Prometheus Operator,
  # not by Kubernetes itself. Enable only when the monitoring.coreos.com/v1
  # ServiceMonitor CRD is installed in the cluster.
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
