namespace: default

scheduler:
  image: kruntimes-scheduler:latest
  imagePullPolicy: IfNotPresent
  replicas: 2
  leaderElect: true
  metricsBindAddress: ":8080"
  probeBindAddress: ":8081"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

controller:
  image: kruntimes-controller:latest
  imagePullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

runtimed:
  image: kruntimes-runtimed:latest
  imagePullPolicy: IfNotPresent
  workers: 2
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

workspace:
  sizeLimit: 10Gi
