namespace: default

scheduler:
  image: kruntimes-scheduler
  imagePullPolicy: IfNotPresent
  replicas: 2
  leaderElect: true
  metricsBindAddress: ":8080"
  probeBindAddress: ":8081"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

controller:
  image: kruntimes-controller
  imagePullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

runtimed:
  image: kruntimes-runtimed
  imagePullPolicy: IfNotPresent
  workers: 2
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

workspace:
  sizeLimit: 10Gi

metrics:
  service:
    type: ClusterIP
    port: 8080
    annotations: {}
  # Disabled by default because ServiceMonitor is provided by Prometheus Operator,
  # not by Kubernetes itself. Enable only when the monitoring.coreos.com/v1
  # ServiceMonitor CRD is installed in the cluster.
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
