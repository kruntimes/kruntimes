apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kruntimes-runtimed
  labels:
    {{- include "kruntimes.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - kruntimes.kruntimes.com
    resources:
      - runs
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - kruntimes.kruntimes.com
    resources:
      - runs/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kruntimes-runtimed
  labels:
    {{- include "kruntimes.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kruntimes-runtimed
subjects:
  - kind: ServiceAccount
    name: kruntimes-runtimed
    namespace: {{ .Release.Namespace }}
