apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kruntimes.runtimed.name" . }}
  labels:
    {{- include "kruntimes.runtimed.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - kruntimes.io
    resources:
      - runs
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  - apiGroups:
      - kruntimes.io
    resources:
      - runs/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - pods/status
    verbs:
      - get
      - patch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kruntimes.runtimed.name" . }}
  labels:
    {{- include "kruntimes.runtimed.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kruntimes.runtimed.name" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kruntimes.runtimed.name" . }}
    namespace: {{ .Release.Namespace }}
