apiVersion: apps/v1
kind: Deployment
metadata:
  name: kruntimes-scheduler
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kruntimes.scheduler.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.scheduler.replicas }}
  selector:
    matchLabels:
      app: kruntimes-scheduler
  template:
    metadata:
      labels:
        app: kruntimes-scheduler
    spec:
      serviceAccountName: kruntimes-scheduler
      containers:
        - name: scheduler
          image: {{ .Values.scheduler.image }}
          imagePullPolicy: {{ .Values.scheduler.imagePullPolicy }}
          args:
            - --leader-elect={{ .Values.scheduler.leaderElect }}
            - --metrics-bind-address={{ .Values.scheduler.metricsBindAddress }}
            - --health-probe-bind-address={{ .Values.scheduler.probeBindAddress }}
          ports:
            - containerPort: 8080
              name: metrics
              protocol: TCP
            - containerPort: 8081
              name: probes
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.scheduler.resources | nindent 12 }}
