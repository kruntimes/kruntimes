apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kruntimes.controller.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kruntimes.controller.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      {{- include "kruntimes.controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.controller.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "kruntimes.controller.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kruntimes.controller.name" . }}
      {{- with .Values.controller.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: controller
          image: {{ include "kruntimes.image" (list . .Values.controller.image) }}
          imagePullPolicy: {{ .Values.controller.imagePullPolicy }}
          {{- with .Values.controller.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            - --leader-elect={{ .Values.controller.leaderElect }}
            - --metrics-bind-address={{ .Values.controller.metricsBindAddress }}
            - --health-probe-bind-address={{ .Values.controller.probeBindAddress }}
            - --default-daemon-image={{ include "kruntimes.image" (list . .Values.runtimed.image) }}
            - --runtimed-service-account-name={{ include "kruntimes.runtimed.name" . }}
            - --artifact-filesystem-root={{ .Values.controller.artifactStore.filesystem.mountPath }}
          {{- if .Values.controller.artifactStore.filesystem.volumeClaimName }}
          volumeMounts:
            - name: artifact-store
              mountPath: {{ .Values.controller.artifactStore.filesystem.mountPath }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.controller.metricsPort }}
              name: metrics
              protocol: TCP
            - containerPort: {{ .Values.controller.probePort }}
              name: probes
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: probes
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
      {{- if .Values.controller.artifactStore.filesystem.volumeClaimName }}
      volumes:
        - name: artifact-store
          persistentVolumeClaim:
            claimName: {{ .Values.controller.artifactStore.filesystem.volumeClaimName }}
      {{- end }}
