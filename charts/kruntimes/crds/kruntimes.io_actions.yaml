      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Action is the Schema for the actions API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ActionSpec defines the desired state of Action.
            properties:
              inputs:
                additionalProperties:
                  description: ActionInputSpec defines one reusable Action input.
                  properties:
                    default:
                      description: Default is the default string value used when the
                        caller does not pass this input.
                      maxLength: 8192
                      type: string
                    required:
                      description: Required marks the input as required.
                      type: boolean
                    type:
                      default: string
                      description: Type is the input type.
                      enum:
                      - string
                      type: string
                  type: object
                description: Inputs defines parameters accepted by this Action.
                maxProperties: 64
                type: object
              outputs:
                additionalProperties:
                  description: ActionOutputSpec defines one reusable Action output.
                  properties:
                    value:
                      description: Value is a ${{ }} expression evaluated after the
                        Action steps run.
                      maxLength: 8192
                      minLength: 1
                      type: string
                  required:
                  - value
                  type: object
                description: Outputs defines values exposed by this Action after its
                  steps complete.
                maxProperties: 64
                type: object
              steps:
                description: |-
                  Steps is the reusable step sequence. In the first version, Action steps
                  support run steps only; nested uses remains a future extension.
                items:
                  description: StepSpec defines a single step within a job.
                  properties:
                    args:
                      description: Args is positional arguments for the step.
