---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: workflowruns.kruntimes.io
spec:
  group: kruntimes.io
  names:
    kind: WorkflowRun
    listKind: WorkflowRunList
    plural: workflowruns
    shortNames:
    - wfr
    singular: workflowrun
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: WorkflowRun is the Schema for workflow execution instances.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: WorkflowRunSpec defines one workflow execution instance.
            properties:
              cancelRequested:
                description: |-
                  CancelRequested requests cancellation of this WorkflowRun. Once observed,
                  the controller stops creating child Runs and requests cancellation of
                  active child Runs.
                type: boolean
              jobs:
                additionalProperties:
                  description: JobSpec defines a single job within a workflow.
                  properties:
                    needs:
                      description: Needs is the list of job names that must complete
                        before this job starts.
                      items:
                        maxLength: 63
                        type: string
                      maxItems: 64
                      type: array
                    outputs:
                      additionalProperties:
                        type: string
                      description: Outputs maps job-level output names to ${{ }} expressions.
                      maxProperties: 64
                      type: object
                    runs-on:
                      description: |-
                        RunsOn is the runtime to use for all steps in this job (e.g., "bash", "python").
                        Runtime names are propagated to Kubernetes label values.
                      maxLength: 63
                      minLength: 1
                      pattern: ^([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9]$
                      type: string
                    steps:
                      description: Steps is the list of steps to run sequentially
                        within the job.
                      items:
                        description: StepSpec defines a single step within a job.
                        properties:
                          args:
                            description: Args is positional arguments for the step.
                            items:
                              maxLength: 8192
                              type: string
                            maxItems: 256
                            type: array
                          env:
                            additionalProperties:
                              type: string
                            description: Env is extra environment variables for the
                              step.
                            maxProperties: 256
                            type: object
                          name:
                            description: |-
                              Name of the step.
                              Step names become Kubernetes label values on child Runs.
                            maxLength: 63
                            minLength: 1
                            pattern: ^([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9]$
                            type: string
                          run:
                            description: |-
                              Run is the inline command/script to execute.
                              Match the Run inline-source limit.
                            maxLength: 262144
                            type: string
                          uses:
                            description: Uses references an Action or WorkflowTemplate
                              (future).
                            maxLength: 2048
                            type: string
                          with:
                            additionalProperties:
                              type: string
                            description: With passes parameters to an Action (future).
                            maxProperties: 256
                            type: object
                        required:
                        - name
                        type: object
                        x-kubernetes-validations:
                        - message: run must be set and uses is not supported yet
                          rule: has(self.run) && !has(self.uses)
                      maxItems: 128
                      minItems: 1
                      type: array
                    uses:
                      description: Uses references a reusable Workflow in the same
                        namespace.
                      maxLength: 253
                      minLength: 1
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                      type: string
                    with:
                      additionalProperties:
                        type: string
                      description: With passes string inputs to the reusable Workflow
                        referenced by Uses.
                      maxProperties: 256
                      type: object
                  type: object
                  x-kubernetes-validations:
                  - message: exactly one of steps or uses must be set
                    rule: has(self.steps) != has(self.uses)
                  - message: with can only be set when uses is set
                    rule: '!has(self.with) || has(self.uses)'
                description: |-
                  Jobs is a map of inline job names to job specs. Jobs run in parallel
                  unless constrained by needs; the map order is not significant.
                  Job names become Kubernetes label values on child Runs.
                maxProperties: 64
                minProperties: 1
                type: object
                x-kubernetes-validations:
                - message: job names must be valid Kubernetes label values with at
                    most 63 characters
                  rule: self.all(name, size(name) <= 63 && name.matches('^([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9]$'))
              uses:
                description: Uses references a reusable Workflow in the same namespace.
                maxLength: 253
                minLength: 1
                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                type: string
              with:
                additionalProperties:
                  type: string
                description: With passes string inputs to the reusable Workflow referenced
                  by Uses.
                maxProperties: 256
                type: object
            type: object
            x-kubernetes-validations:
            - message: exactly one of jobs or uses must be set
              rule: has(self.jobs) != has(self.uses)
            - message: with can only be set when uses is set
              rule: '!has(self.with) || has(self.uses)'
            - message: each dependency must name another job in this WorkflowRun
              rule: '!has(self.jobs) || self.jobs.all(name, !has(self.jobs[name].needs)
                || self.jobs[name].needs.all(need, need in self.jobs && need != name))'
          status:
            description: WorkflowRunStatus defines the observed state of a WorkflowRun.
            properties:
              conditions:
                description: Conditions represent the current state of the WorkflowRun
                  lifecycle.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                maxItems: 16
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              jobs:
                additionalProperties:
                  description: JobStatus tracks the status of a job.
                  properties:
                    phase:
                      description: Phase is the current phase of the job.
                      enum:
                      - Pending
                      - Waiting
                      - Running
                      - Succeeded
                      - Failed
                      - Skipped
                      type: string
                    pre:
                      description: |-
                        Pre is the resolved list of predecessor jobs that must complete before
                        this job can start.
                      items:
                        maxLength: 63
                        type: string
                      maxItems: 64
                      type: array
                    steps:
                      description: Steps tracks each step in the original job step
                        order.
                      items:
                        description: StepStatus tracks the status of a step.
                        properties:
                          name:
                            description: Name is the step name.
                            maxLength: 63
                            minLength: 1
                            pattern: ^([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9]$
                            type: string
                          outputs:
                            additionalProperties:
                              type: string
                            description: Outputs is key-value pairs exposed by this
                              step.
                            maxProperties: 64
                            type: object
                          phase:
                            description: Phase is the current phase of the step.
                            enum:
                            - Pending
                            - Running
                            - Succeeded
                            - Failed
                            type: string
                          runName:
                            description: RunName is the name of the Run CRD created
                              for this step.
                            type: string
                        required:
                        - name
                        - phase
                        type: object
                      maxItems: 128
                      type: array
                  required:
                  - phase
                  type: object
                description: Jobs tracks the status of each job by name.
                maxProperties: 64
                type: object
              message:
                description: Message is a human-readable status or error message.
                maxLength: 4096
                type: string
              phase:
                default: Pending
                description: Phase is the current lifecycle phase of this workflow
                  execution.
                enum:
                - Pending
                - Running
                - Succeeded
                - Failed
                - Cancelled
                type: string
            required:
            - phase
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
