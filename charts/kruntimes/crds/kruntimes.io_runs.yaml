---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: runs.kruntimes.io
spec:
  group: kruntimes.io
  names:
    kind: Run
    listKind: RunList
    plural: runs
    shortNames:
    - rn
    singular: run
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.assignedPod
      name: Assigned Pod
      type: string
    - jsonPath: .spec.runtime
      name: Runtime
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Run is the Schema for the runs API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: RunSpec defines the desired state of Run.
            properties:
              args:
                description: Args is the list of arguments passed to the runtime.
                items:
                  maxLength: 8192
                  type: string
                maxItems: 256
                type: array
              cancelRequested:
                description: CancelRequested is set to true to request cancellation
                  of a running Run.
                type: boolean
              entrypoint:
                description: |-
                  Entrypoint is the script file to execute (default "script" for inline source).
                  Linux PATH_MAX is 4096 bytes.
                maxLength: 4096
                type: string
              env:
                description: Env is the list of environment variables to set for execution.
                items:
                  description: EnvVar represents an environment variable present in
                    a Container.
                  properties:
                    name:
                      description: |-
                        Name of the environment variable.
                        May consist of any printable ASCII characters except '='.
                      type: string
                    value:
                      description: |-
                        Variable references $(VAR_NAME) are expanded
                        using the previously defined environment variables in the container and
                        any service environment variables. If a variable cannot be resolved,
                        the reference in the input string will be unchanged. Double $$ are reduced
                        to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e.
                        "$$(VAR_NAME)" will produce the string literal "$(VAR_NAME)".
                        Escaped references will never be expanded, regardless of whether the variable
                        exists or not.
                        Defaults to "".
                      type: string
                    valueFrom:
                      description: Source for the environment variable's value. Cannot
                        be used if value is not empty.
                      properties:
                        configMapKeyRef:
                          description: Selects a key of a ConfigMap.
                          properties:
                            key:
                              description: The key to select.
                              type: string
                            name:
                              default: ""
                              description: |-
                                Name of the referent.
                                This field is effectively required, but due to backwards compatibility is
                                allowed to be empty. Instances of this type with an empty value here are
                                almost certainly wrong.
                                More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                              type: string
                            optional:
                              description: Specify whether the ConfigMap or its key
                                must be defined
                              type: boolean
                          required:
                          - key
                          type: object
                          x-kubernetes-map-type: atomic
                        fieldRef:
                          description: |-
                            Selects a field of the pod: supports metadata.name, metadata.namespace, `metadata.labels['<KEY>']`, `metadata.annotations['<KEY>']`,
                            spec.nodeName, spec.serviceAccountName, status.hostIP, status.podIP, status.podIPs.
                          properties:
                            apiVersion:
                              description: Version of the schema the FieldPath is
                                written in terms of, defaults to "v1".
                              type: string
                            fieldPath:
                              description: Path of the field to select in the specified
                                API version.
                              type: string
                          required:
                          - fieldPath
                          type: object
                          x-kubernetes-map-type: atomic
                        fileKeyRef:
                          description: |-
                            FileKeyRef selects a key of the env file.
                            Requires the EnvFiles feature gate to be enabled.
                          properties:
                            key:
                              description: |-
                                The key within the env file. An invalid key will prevent the pod from starting.
                                The keys defined within a source may consist of any printable ASCII characters except '='.
                                During Alpha stage of the EnvFiles feature gate, the key size is limited to 128 characters.
                              type: string
                            optional:
                              default: false
                              description: |-
                                Specify whether the file or its key must be defined. If the file or key
                                does not exist, then the env var is not published.
                                If optional is set to true and the specified key does not exist,
                                the environment variable will not be set in the Pod's containers.

                                If optional is set to false and the specified key does not exist,
                                an error will be returned during Pod creation.
                              type: boolean
                            path:
                              description: |-
                                The path within the volume from which to select the file.
                                Must be relative and may not contain the '..' path or start with '..'.
                              type: string
                            volumeName:
                              description: The name of the volume mount containing
                                the env file.
                              type: string
                          required:
                          - key
                          - path
                          - volumeName
                          type: object
                          x-kubernetes-map-type: atomic
                        resourceFieldRef:
                          description: |-
                            Selects a resource of the container: only resources limits and requests
                            (limits.cpu, limits.memory, limits.ephemeral-storage, requests.cpu, requests.memory and requests.ephemeral-storage) are currently supported.
                          properties:
                            containerName:
                              description: 'Container name: required for volumes,
                                optional for env vars'
                              type: string
                            divisor:
                              anyOf:
                              - type: integer
                              - type: string
                              description: Specifies the output format of the exposed
                                resources, defaults to "1"
                              pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                              x-kubernetes-int-or-string: true
                            resource:
                              description: 'Required: resource to select'
                              type: string
                          required:
                          - resource
                          type: object
                          x-kubernetes-map-type: atomic
                        secretKeyRef:
                          description: Selects a key of a secret in the pod's namespace
                          properties:
                            key:
                              description: The key of the secret to select from.  Must
                                be a valid secret key.
                              type: string
                            name:
                              default: ""
                              description: |-
                                Name of the referent.
                                This field is effectively required, but due to backwards compatibility is
                                allowed to be empty. Instances of this type with an empty value here are
                                almost certainly wrong.
                                More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                              type: string
                            optional:
                              description: Specify whether the Secret or its key must
                                be defined
                              type: boolean
                          required:
                          - key
                          type: object
                          x-kubernetes-map-type: atomic
                      type: object
                  required:
                  - name
                  type: object
                maxItems: 256
                type: array
              handler:
                description: |-
                  Handler is the module.function to call (FaaS mode).
                  When set, the runtime imports and calls the function instead of running a script.
                maxLength: 512
                type: string
              retryPolicy:
                description: RetryPolicy is the retry strategy for the Run. If nil,
                  no retries are attempted.
                properties:
                  backoff:
                    description: |-
                      Backoff is the initial backoff duration between retries.
                      The backoff doubles after each retry (exponential backoff with 2x multiplier),
                      capped at 60 seconds.
                    type: string
                  maxAttempts:
                    description: |-
                      MaxAttempts is the maximum number of execution attempts (including the initial attempt).
                      Default: 1 (no retries).
                    format: int32
                    maximum: 100
                    minimum: 1
                    type: integer
                  retryableReasons:
                    description: |-
                      RetryableReasons lists the failure reasons that are eligible for retry.
                      If empty, all reasons except "Cancelled" are retryable.
                    items:
                      maxLength: 128
                      type: string
                    maxItems: 32
                    type: array
                type: object
              runtime:
                description: |-
                  Runtime is the execution environment type (e.g., "python").
                  It maps to the "runtime" label on Runtime Pods.
                  Runtime names are propagated to Kubernetes label values.
                maxLength: 63
                minLength: 1
                pattern: ^([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9]$
                type: string
              source:
                description: Source specifies where the code to run comes from.
                properties:
                  commitSHA:
                    description: |-
                      CommitSHA is the specific commit to check out.
                      The limit also permits symbolic refs while bounding object growth.
                    maxLength: 256
                    type: string
                  inline:
                    description: |-
                      Inline is the source code as a string (for simple scripts).
                      Mutually exclusive with RepoURL.
                      256 KiB keeps simple scripts well below the Kubernetes object size limit.
                    maxLength: 262144
                    type: string
                  repoURL:
                    description: |-
                      RepoURL is the Git repository URL to clone before execution.
                      2048 characters accommodates conventional HTTPS and SSH Git URLs.
                    maxLength: 2048
                    type: string
                type: object
                x-kubernetes-validations:
                - message: inline and repoURL are mutually exclusive
                  rule: '!(has(self.inline) && has(self.repoURL))'
                - message: commitSHA requires repoURL
                  rule: '!has(self.commitSHA) || has(self.repoURL)'
              timeout:
                description: |-
                  Timeout is the maximum duration the run is allowed to run.
                  If not set, the run runs with no time limit.
                type: string
              ttlSecondsAfterFinished:
                description: |-
                  TTLSecondsAfterFinished limits the lifetime of a finished Run.
                  If set to a positive value, the controller deletes the Run after this many seconds
                  from status.completionTime. If unset or zero, the Run is retained.
                format: int32
                minimum: 0
                type: integer
            required:
            - runtime
            type: object
            x-kubernetes-validations:
            - message: entrypoint must be a relative path that does not contain '..'
              rule: '!has(self.entrypoint) || (!self.entrypoint.startsWith(''/'')
                && !self.entrypoint.split(''/'').exists(segment, segment == ''..''))'
          status:
            description: RunStatus defines the observed state of Run.
            properties:
              artifactRefs:
                description: ArtifactRefs point to artifacts stored outside etcd.
                items:
                  description: ArtifactRef is compact metadata that points to artifact
                    content stored outside etcd.
                  properties:
                    contentType:
                      description: ContentType is the detected media type.
                      maxLength: 255
                      type: string
                    createdAt:
                      description: CreatedAt records when the artifact was stored.
                      format: date-time
                      type: string
                    digest:
                      description: Digest is the content digest, including its algorithm
                        prefix.
                      maxLength: 256
                      type: string
                    driver:
                      description: Driver identifies the ArtifactStore implementation.
                      enum:
                      - filesystem
                      - s3
                      type: string
                    location:
                      description: Location contains driver-specific storage coordinates.
                      properties:
                        filesystem:
                          description: Filesystem identifies an artifact in a filesystem
                            store.
                          properties:
                            path:
                              description: Path is relative to the artifact store
                                root.
                              maxLength: 4096
                              minLength: 1
                              type: string
                            volumeClaimName:
                              description: VolumeClaimName identifies the PVC backing
                                the filesystem store.
                              maxLength: 253
                              type: string
                          required:
                          - path
                          type: object
                        s3:
                          description: S3 identifies an artifact in an S3-compatible
                            object store.
                          properties:
                            bucket:
                              description: Bucket is the object store bucket.
                              maxLength: 255
                              minLength: 1
                              type: string
                            key:
                              description: Key is the object key within the bucket.
                              maxLength: 4096
                              minLength: 1
                              type: string
                          required:
                          - bucket
                          - key
                          type: object
                      type: object
                      x-kubernetes-validations:
                      - message: exactly one artifact location must be set
                        rule: has(self.filesystem) != has(self.s3)
                    name:
                      description: |-
                        Name is the logical artifact name exposed by the Run.
                        Artifact collection enforces the same 255-byte upper bound.
                      maxLength: 255
                      minLength: 1
                      type: string
                    sizeBytes:
                      description: SizeBytes is the stored artifact size.
                      format: int64
                      minimum: 0
                      type: integer
                    type:
                      description: Type describes how the artifact content is represented.
                      enum:
                      - file
                      - directory
                      - archive
                      - blob
                      type: string
                  required:
                  - createdAt
                  - driver
                  - location
                  - name
                  - sizeBytes
                  - type
                  type: object
                  x-kubernetes-validations:
                  - message: artifact location must match driver
                    rule: (self.driver == 'filesystem' && has(self.location.filesystem))
                      || (self.driver == 's3' && has(self.location.s3))
                maxItems: 32
                type: array
              assignedPod:
                description: AssignedPod is the name of the Runtime Pod assigned by
                  the scheduler.
                type: string
              attempt:
                description: Attempt is the current execution attempt number (1-based).
                format: int32
                type: integer
              completionTime:
                description: CompletionTime is when the run finished (success or failure).
                format: date-time
                type: string
              conditions:
                description: Conditions represent the current state of the Run's lifecycle
                  conditions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                maxItems: 16
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              message:
                description: |-
                  Message is a human-readable status or error message.
                  Status messages are diagnostic summaries, not execution logs.
                maxLength: 4096
                type: string
              outputs:
                additionalProperties:
                  type: string
                description: |-
                  Outputs is the key-value pairs exposed by this Run (from $OUTPUTS file).
                  These limits mirror the runtimed output parser's per-key bounds.
                maxProperties: 64
                type: object
              phase:
                default: Pending
                description: Phase is the current lifecycle phase of the run.
                enum:
                - Pending
                - Scheduled
                - Running
                - Succeeded
                - Failed
                - Timeout
                - Cancelled
                type: string
              startTime:
                description: StartTime is when the run began executing.
                format: date-time
                type: string
            required:
            - phase
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
