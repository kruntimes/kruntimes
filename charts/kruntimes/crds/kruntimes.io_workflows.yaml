metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: workflows.kruntimes.io
spec:
  group: kruntimes.io
  names:
    kind: Workflow
    listKind: WorkflowList
    plural: workflows
    shortNames:
    - wf
    singular: workflow
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
