{{- range .Values.runtimes }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runtime-{{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    runtime: {{ .name }}
    {{- include "kruntime.agent.labels" $ | nindent 4 }}
spec:
  replicas: {{ .replicas }}
  selector:
    matchLabels:
      runtime: {{ .name }}
  template:
    metadata:
      labels:
        runtime: {{ .name }}
    spec:
      serviceAccountName: kruntime-agent
      containers:
        - name: agent
          image: {{ $.Values.agent.image }}
          imagePullPolicy: {{ $.Values.agent.imagePullPolicy }}
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: WORKSPACE_DIR
              value: /workspace
            - name: AGENT_WORKERS
              value: {{ $.Values.agent.workers | quote }}
          ports:
            - containerPort: 9090
              name: metrics
              protocol: TCP
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          resources:
            {{- toYaml $.Values.agent.resources | nindent 12 }}
      volumes:
        - name: workspace
          emptyDir:
            sizeLimit: {{ $.Values.workspace.sizeLimit }}
---
{{- end }}
