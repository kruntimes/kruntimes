apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kruntime-agent
  labels:
    {{- include "kruntime.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - kruntime.airconduct.com
    resources:
      - tasks
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - kruntime.airconduct.com
    resources:
      - tasks/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kruntime-agent
  labels:
    {{- include "kruntime.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kruntime-agent
subjects:
  - kind: ServiceAccount
    name: kruntime-agent
    namespace: {{ .Release.Namespace }}
