baseURL: "https://kruntimes.github.io/kruntimes/"
languageCode: "en-us"
title: "kruntimes"
disableKinds:
  - taxonomy
  - term
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
module:
  mounts:
    - source: content
      target: content
    - source: ../docs
      target: content/docs
    - source: ../docs/logo.png
      target: static/img/logo.png
    - source: ../docs/icon.png
      target: static/img/icon.png
    - source: static
      target: static
params:
  description: "Warm Runtime Pods and application-level scheduling for short-lived Kubernetes workloads."
