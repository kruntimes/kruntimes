apiVersion: apps/v1
kind: Deployment
metadata:
  name: kruntime-scheduler
  namespace: default
  labels:
    app: kruntime-scheduler
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kruntime-scheduler
  template:
    metadata:
      labels:
        app: kruntime-scheduler
    spec:
      serviceAccountName: kruntime-scheduler
      containers:
        - name: scheduler
          image: kruntime-scheduler:latest
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect=true
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          ports:
            - containerPort: 8080
              name: metrics
              protocol: TCP
            - containerPort: 8081
              name: probes
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
