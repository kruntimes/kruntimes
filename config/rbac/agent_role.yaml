apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kruntime-agent
rules:
  - apiGroups:
      - kruntime.airconduct.com
    resources:
      - tasks
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - kruntime.airconduct.com
    resources:
      - tasks/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
