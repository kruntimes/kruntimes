name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not report security vulnerabilities here. Follow SECURITY.md instead.
  - type: input
    id: version
    attributes:
      label: Version
      description: kruntimes release, image tag, or commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Kubernetes version, Helm version, and installation method
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include minimal manifests or commands where possible
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and status
      description: Remove credentials, tokens, source code, and other sensitive data
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues and pull requests.
          required: true
        - label: This report does not contain a security vulnerability.
          required: true
