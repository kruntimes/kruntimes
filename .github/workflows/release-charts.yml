name: Release Charts

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish charts for"
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: release-charts-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Helm OCI charts
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: azure/setup-helm@v5.0.1

      - name: Validate chart versions
        shell: bash
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          for chart in charts/kruntimes charts/kruntimes-runtimes; do
            chart_version="$(helm show chart "${chart}" | awk '$1 == "version:" { print $2 }')"
            app_version="$(helm show chart "${chart}" | awk '$1 == "appVersion:" { gsub(/"/, "", $2); print $2 }')"
            if [[ "${chart_version}" != "${version}" ]]; then
              echo "${chart} version ${chart_version} does not match ${version}" >&2
              exit 1
            fi
            if [[ "${app_version}" != "${version}" ]]; then
              echo "${chart} appVersion ${app_version} does not match ${version}" >&2
              exit 1
            fi
          done

      - name: Lint charts
        run: helm lint ./charts/kruntimes ./charts/kruntimes-runtimes

      - name: Package charts
        run: |
          mkdir -p dist/charts
          helm package ./charts/kruntimes --destination dist/charts
          helm package ./charts/kruntimes-runtimes --destination dist/charts

      - name: Log in to GitHub Container Registry
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          echo "${GH_TOKEN}" | helm registry login ghcr.io \
            --username "${GITHUB_ACTOR}" \
            --password-stdin

      - name: Publish charts
        shell: bash
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          registry="oci://ghcr.io/${owner}/charts"
          for package in dist/charts/*.tgz; do
            helm push "${package}" "${registry}"
          done
