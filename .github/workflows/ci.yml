name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Go unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: make test
      - name: Verify tests did not modify tracked files
        run: git diff --exit-code

  integration:
    name: Go integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: make test-integration

  race:
    name: Go race detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: make test-race

  python:
    name: Python Runtime tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtimes/python
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          working-directory: runtimes/python
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run --frozen python -m unittest server_test -v

  helm:
    name: Helm charts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5.0.0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: make test-helm

  generated:
    name: Generated files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: make generate manifests
      - name: Verify generated files are current
        run: git diff --exit-code
