name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect non-docs changes
    runs-on: ubuntu-latest
    outputs:
      non_docs: ${{ steps.filter.outputs.non_docs }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          predicate-quantifier: every
          filters: |
            non_docs:
              - "**"
              - "!README.md"
              - "!docs/**"
              - "!site/**"

  unit:
    name: Go unit tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.non_docs == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: make test
      - name: Verify tests did not modify tracked files
        run: git diff --exit-code

  integration:
    name: Go integration tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.non_docs == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: make test-integration

  race:
    name: Go race detector
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.non_docs == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: make test-race

  python:
    name: Python Runtime tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.non_docs == 'true'
    defaults:
      run:
        working-directory: runtimes/python
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          working-directory: runtimes/python
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run --frozen python -m unittest server_test -v

  helm:
    name: Helm charts
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.non_docs == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: azure/setup-helm@v5.0.1
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: make test-helm

  generated:
    name: Generated files
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.non_docs == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: make generate manifests
      - name: Verify generated files are current
        run: git diff --exit-code
