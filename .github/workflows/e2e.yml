name: E2E

on:
  schedule:
    - cron: "0 3 * * 6"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: make e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          working-directory: runtimes/python
          python-version: "3.12"
          enable-cache: true
      - uses: azure/setup-helm@v5.0.1
      - uses: helm/kind-action@v1.14.0
        with:
          cluster_name: kruntimes-e2e
      - run: make e2e
      - name: Dump Kubernetes diagnostics
        if: failure()
        run: |
          set +e
          kubectl get nodes -o wide
          kubectl get pods,deployments,replicasets,runtimes,runs,workflows -A -o wide
          kubectl describe pods -A
          kubectl describe runtimes -A
          kubectl describe runs -A
          kubectl get events -A --sort-by=.lastTimestamp
          kubectl logs deploy/kruntimes-controller --all-containers --tail=300 || true
          kubectl logs -l app=kruntimes-scheduler --all-containers --tail=300 || true
          for pod in $(kubectl get pods -A -l runtime -o jsonpath='{range .items[*]}{.metadata.namespace}/{.metadata.name}{"\n"}{end}'); do
            namespace=${pod%%/*}
            name=${pod#*/}
            kubectl logs -n "$namespace" "$name" --all-containers --tail=300 || true
            kubectl exec -n "$namespace" "$name" -c runtime -- bash -c \
              'exec 3<>/dev/tcp/127.0.0.1/9094; printf "GET /readyz?verbose HTTP/1.0\r\n\r\n" >&3; cat <&3' || true
          done
