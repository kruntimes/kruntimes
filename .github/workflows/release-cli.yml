name: Release CLI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and upload CLI artifacts for"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish krt binaries
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build krt archives
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          platforms=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
          )

          for platform in "${platforms[@]}"; do
            read -r goos goarch <<< "${platform}"
            name="krt_${RELEASE_TAG}_${goos}_${goarch}"
            workdir="dist/${name}"
            binary="krt"
            if [[ "${goos}" == "windows" ]]; then
              binary="krt.exe"
            fi

            mkdir -p "${workdir}"
            ldflags="-s -w"
            ldflags="${ldflags} -X github.com/kruntimes/kruntimes/internal/version.Version=${RELEASE_TAG#v}"
            ldflags="${ldflags} -X github.com/kruntimes/kruntimes/internal/version.Commit=${GITHUB_SHA}"
            ldflags="${ldflags} -X github.com/kruntimes/kruntimes/internal/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" \
              go build -trimpath -ldflags="${ldflags}" -o "${workdir}/${binary}" ./cmd/krt

            tar -C "${workdir}" -czf "dist/${name}.tar.gz" "${binary}"
            rm -rf "${workdir}"
          done

          (cd dist && sha256sum krt_*.tar.gz > "krt_${RELEASE_TAG}_checksums.txt")

      - name: Attest krt artifacts
        uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*_checksums.txt

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" \
              --draft \
              --title "kruntimes ${RELEASE_TAG}" \
              --notes "Draft release for ${RELEASE_TAG}."
          fi

          gh release upload "${RELEASE_TAG}" dist/* --clobber
