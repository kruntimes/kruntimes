syntax = "proto3";

package taskruntime.v1;

option go_package = "github.com/airconduct/kruntime/api/taskruntime/v1;taskruntimev1";

// TaskRuntime is the gRPC service that runtimes must implement.
// The agent sidecar calls this to delegate command execution.
service TaskRuntime {
    rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);
    rpc GetTask(GetTaskRequest) returns (GetTaskResponse);
    rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
    rpc DeleteTask(DeleteTaskRequest) returns (DeleteTaskResponse);
}

message CreateTaskRequest {
    string id = 1;
    repeated string commands = 2;
    map<string, string> env = 3;
    int64 timeout_seconds = 4;
    string working_dir = 5;
}

message CreateTaskResponse {
    string id = 1;
}

message GetTaskRequest {
    string id = 1;
}

message GetTaskResponse {
    string id = 1;
    TaskState state = 2;
    int32 exit_code = 3;
    string stdout = 4;
    string stderr = 5;
    string error_message = 6;
}

enum TaskState {
    TASK_STATE_UNSPECIFIED = 0;
    TASK_STATE_PENDING = 1;
    TASK_STATE_RUNNING = 2;
    TASK_STATE_SUCCEEDED = 3;
    TASK_STATE_FAILED = 4;
}

message ListTasksRequest {}

message ListTasksResponse {
    repeated GetTaskResponse tasks = 1;
}

message DeleteTaskRequest {
    string id = 1;
}

message DeleteTaskResponse {}
