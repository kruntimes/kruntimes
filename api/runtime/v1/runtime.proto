syntax = "proto3";

package executor.v1;

option go_package = "github.com/kruntimes/kruntimes/api/runtime/v1;runtimev1";

// Executor is the gRPC service that runtimes must implement.
// The agent sidecar calls this to delegate command execution.
service Runtime {
    rpc Execute(ExecuteRequest) returns (ExecuteResponse);
    rpc Status(StatusRequest) returns (StatusResponse);
    rpc List(ListRequest) returns (ListResponse);
    rpc Cancel(CancelRequest) returns (CancelResponse);
    // Forget releases a terminal execution and its retained output.
    // Running executions must be cancelled before they can be forgotten.
    rpc Forget(ForgetRequest) returns (ForgetResponse);
    rpc Health(HealthRequest) returns (HealthResponse);
}

// FunctionRuntime is an optional Runtime Server extension for function-mode
// lifecycle operations. Task-only custom runtimes implement Runtime only.
service FunctionRuntime {
    // Function-mode lifecycle operations are Pod-local and called by runtimed.
    rpc RegisterFunction(RegisterFunctionRequest) returns (RegisterFunctionResponse);
    rpc FunctionStatus(FunctionStatusRequest) returns (FunctionStatusResponse);
    rpc InvokeFunction(InvokeFunctionRequest) returns (InvokeFunctionResponse);
    rpc UnregisterFunction(UnregisterFunctionRequest) returns (UnregisterFunctionResponse);
}

message ExecuteRequest {
    string id = 1;
    repeated string args = 2;
    map<string, string> env = 3;
    int64 timeout_seconds = 4;
    string working_dir = 5;

    // entrypoint is the script file to execute within working_dir.
    string entrypoint = 6;
    // handler in module.function format (FaaS mode).
    string handler = 7;
}

message ExecuteResponse {
    string id = 1;
}

message StatusRequest {
    string id = 1;
}

message StatusResponse {
    string id = 1;
    ExecutionState state = 2;
    int32 exit_code = 3;
    string stdout = 4;
    string stderr = 5;
    string error_message = 6;
}

enum ExecutionState {
    EXECUTION_STATE_UNSPECIFIED = 0;
    EXECUTION_STATE_PENDING = 1;
    EXECUTION_STATE_RUNNING = 2;
    EXECUTION_STATE_SUCCEEDED = 3;
    EXECUTION_STATE_FAILED = 4;
}

message ListRequest {}

message ListResponse {
    repeated StatusResponse entries = 1;
}

message CancelRequest {
    string id = 1;
}

message CancelResponse {}

message ForgetRequest {
    string id = 1;
}

message ForgetResponse {}

message HealthRequest {}

message HealthResponse {
    bool healthy = 1;
    string message = 2;
}

// FunctionRegistration identifies one Runtime Server-local registration epoch.
message FunctionRegistration {
    // Kubernetes Run UID, not its mutable name.
    string run_uid = 1;
    // Opaque Runtime Server-generated ID for this local registration generation.
    string registration_id = 2;
}

enum FunctionRegistrationState {
    FUNCTION_REGISTRATION_STATE_UNSPECIFIED = 0;
    FUNCTION_REGISTRATION_STATE_REGISTERING = 1;
    FUNCTION_REGISTRATION_STATE_READY = 2;
    FUNCTION_REGISTRATION_STATE_DRAINING = 3;
    FUNCTION_REGISTRATION_STATE_FAILED = 4;
}

message RegisterFunctionRequest {
    string run_uid = 1;
    int32 registration_attempt = 2;
    string working_dir = 3;
    string handler = 4;
    map<string, string> env = 5;
    int64 idle_timeout_seconds = 6;
    string registration_digest = 7;
}

message RegisterFunctionResponse {
    FunctionRegistration registration = 1;
    FunctionRegistrationState state = 2;
}

message FunctionStatusRequest {
    FunctionRegistration registration = 1;
}

message FunctionStatusResponse {
    FunctionRegistration registration = 1;
    FunctionRegistrationState state = 2;
    int32 in_flight = 3;
    int64 last_activity_unix_nano = 4;
    string fatal_error = 5;
}

message InvokeFunctionRequest {
    FunctionRegistration registration = 1;
    string invocation_id = 2;
    bytes input = 3;
    string content_type = 4;
    int64 timeout_millis = 5;
}

message InvokeFunctionResponse {
    FunctionRegistration registration = 1;
    string invocation_id = 2;
    bytes output = 3;
    string content_type = 4;
    map<string, string> outputs = 5;
}

message UnregisterFunctionRequest {
    FunctionRegistration registration = 1;
    bool cancel_in_flight = 2;
    int64 drain_timeout_millis = 3;
}

message UnregisterFunctionResponse {
    FunctionRegistration registration = 1;
}
